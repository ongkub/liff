<!DOCTYPE html>

            background: #fff;
            border: 2px solid #ddd;
            padding: 15px;

            border-radius: 8px;

let currentQuestionIndex = 0;
let score = 0;

function startQuiz() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    loadQuestion();
}

function loadQuestion() {
    const q = quizData[currentQuestionIndex];
    document.getElementById('q-number').innerText = `ข้อที่ ${currentQuestionIndex + 1}/50`;
    document.getElementById('q-text').innerText = q.question;
    
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = `${String.fromCharCode(161 + index)}. ${opt}`;
        btn.onclick = () => checkAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });

    const progress = ((currentQuestionIndex) / 50) * 100;
    document.getElementById('progress-fill').style.width = progress + '%';
}

function checkAnswer(selectedIndex, btnElement) {
    const q = quizData[currentQuestionIndex];
    const options = document.getElementsByClassName('option-btn');
    
    for(let i=0; i<options.length; i++) {
        options[i].disabled = true;
        if(i === q.answer) {
            options[i].classList.add('correct');
        } else if (i === selectedIndex) {
            options[i].classList.add('incorrect');
        }
    }

    if (selectedIndex === q.answer) score++;

    const expDiv = document.getElementById('explanation');
    expDiv.style.display = 'block';
    expDiv.innerHTML = `<strong>${selectedIndex === q.answer ? '✅ ถูกต้อง!' : '❌ ยังไม่ถูก!'}</strong><br><br><b>💡 คำอธิบาย:</b> ${q.explanation}`;
    
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `คุณทำได้: ${score} / 50 คะแนน`;
    
    let msg = "";
    if(score >= 45) msg = "สุดยอดมาก! คุณเชี่ยวชาญระดับ Expert 🏆 ยิงแอด LINE ได้แม่นยำทุกมิติ";
    else if(score >= 35) msg = "ยอดเยี่ยม! ความรู้ของคุณแน่นมาก เตรียมสอบ Certificate ได้สบาย 🌟";
    else if(score >= 25) msg = "ทำได้ดีครับ แต่ยังมีทริคการ Bidding และ Placement ที่ต้องทบทวนอีกนิด 📚";
    else msg = "ไม่เป็นไรครับ LINE Ads มีรายละเอียดเชิงลึกเยอะมาก ลองทบทวนคู่มือแล้วลุยใหม่นะครับ 💪";
    
    document.getElementById('final-message').innerText = msg;
    document.getElementById('progress-fill').style.width = '100%';
}
